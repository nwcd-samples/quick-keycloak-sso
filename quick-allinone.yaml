AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Amazon Quick + Keycloak all-in-one self-configuring stack.
  One stack creates: networking / EC2+Keycloak / ALB / ACM / Route53.
  EC2 auto-configures Keycloak on boot (realm/client/mapper); a Lambda fetches the
  SAML metadata; then native resources create the SAML provider + policies + roles.
  Only manual step: fill one OIDC extension form in the Amazon Quick console (no AWS API).

Parameters:
  NamePrefix:
    Type: String
    Default: quick
    AllowedPattern: '[a-z0-9-]{1,12}'
    Description: >
      Resource name prefix to distinguish SSO deployments (e.g. quick / desktop).
      Lowercase letters/digits/hyphen, <=12 chars. Applied to SAML provider name,
      IAM role/policy names, ALB/target-group names, instance Name tag.
      Each prefix = one fully independent, non-conflicting SSO.
  DomainName:
    Type: String
    Description: Public domain for Keycloak (e.g. quick.example.com), must be in the Route53 zone below
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route53 public hosted zone that owns the domain above
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for the ALB (at least 2 in different AZs)
  KeycloakSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for the Keycloak EC2 (one of the above)
  KeyPairName:
    Type: String
    Default: ""
    Description: (Optional) Existing EC2 key pair name for SSH. Leave EMPTY if you don't need SSH (Keycloak self-configures on boot).
  KeycloakAdminPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Initial Keycloak admin password (use a strong one)
  SSHLocationCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: Source CIDR allowed to SSH (22); recommend your-ip/32
  InstanceType:
    Type: String
    Default: t3.small
  KeycloakImage:
    Type: String
    Default: quay.io/keycloak/keycloak:26.1
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  # ---------- Security Groups ----------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG - 443 from internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0, Description: HTTPS }
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 SG - 5000 from ALB, 22 from admin
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 5000, ToPort: 5000, SourceSecurityGroupId: !Ref ALBSecurityGroup }
        - { IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: !Ref SSHLocationCIDR }

  # ---------- Certificate / ALB / DNS ----------
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - { DomainName: !Ref DomainName, HostedZoneId: !Ref HostedZoneId }

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${NamePrefix}-kc-alb"
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups: [!Ref ALBSecurityGroup]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${NamePrefix}-kc-tg"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 5000
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /realms/master
      HealthCheckPort: '5000'
      Matcher: { HttpCode: '200' }
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      Targets:
        - { Id: !Ref KeycloakInstance, Port: 5000 }

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates: [{ CertificateArn: !Ref Certificate }]
      DefaultActions: [{ Type: forward, TargetGroupArn: !Ref TargetGroup }]

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt LoadBalancer.DNSName
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: true

  # ---------- EC2: Keycloak + auto-config on boot ----------
  KeycloakInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      SubnetId: !Ref KeycloakSubnetId
      SecurityGroupIds: [!Ref EC2SecurityGroup]
      BlockDeviceMappings:
        - { DeviceName: /dev/xvda, Ebs: { VolumeSize: 30, VolumeType: gp3, DeleteOnTermination: true } }
      Tags: [{ Key: Name, Value: !Sub "${NamePrefix}-keycloak" }]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          dnf install -y docker
          systemctl enable docker && systemctl start docker
          docker volume create kc_data
          docker run -d --name keycloak --restart unless-stopped -p 5000:8080 \
            -v kc_data:/opt/keycloak/data \
            -e KC_PROXY_HEADERS=xforwarded -e KC_HOSTNAME=https://${DomainName} \
            -e KC_HTTP_ENABLED=true \
            -e KEYCLOAK_ADMIN=admin -e KEYCLOAK_ADMIN_PASSWORD='${KeycloakAdminPassword}' \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin -e KC_BOOTSTRAP_ADMIN_PASSWORD='${KeycloakAdminPassword}' \
            ${KeycloakImage} start
          # write the auto-config script (stdlib only; AL2023 ships python3)
          cat > /opt/kc-setup.py <<'PYEOF'
          import json,urllib.request,urllib.parse,urllib.error,sys
          KC=sys.argv[1].rstrip("/"); PW=sys.argv[2]
          REALM="quick"; SAML="urn:amazon:webservices"; OIDC="amazon-quick-desktop"
          ACS="https://signin.aws.amazon.com/saml"; A="https://aws.amazon.com/SAML/Attributes"
          def req(m,p,d=None,form=False,t=None):
              h={};b=None
              if t:h["Authorization"]="Bearer "+t
              if d is not None:
                  if form:b=urllib.parse.urlencode(d).encode();h["Content-Type"]="application/x-www-form-urlencoded"
                  else:b=json.dumps(d).encode();h["Content-Type"]="application/json"
              try:
                  x=urllib.request.urlopen(urllib.request.Request(KC+p,data=b,method=m,headers=h));return x.status,x.read().decode()
              except urllib.error.HTTPError as e:return e.code,e.read().decode()
          def g(p,t):return json.loads(req("GET",p,t=t)[1])
          tk=json.loads(req("POST","/realms/master/protocol/openid-connect/token",{"grant_type":"password","client_id":"admin-cli","username":"admin","password":PW},form=True)[1])["access_token"]
          req("POST","/admin/realms",{"realm":REALM,"enabled":True},t=tk)
          pr=g("/admin/realms/"+REALM+"/users/profile",tk);pr["unmanagedAttributePolicy"]="ENABLED";req("PUT","/admin/realms/"+REALM+"/users/profile",pr,t=tk)
          req("POST","/admin/realms/"+REALM+"/clients",{"clientId":SAML,"protocol":"saml","enabled":True,"redirectUris":[ACS],"adminUrl":ACS,"frontchannelLogout":True,"attributes":{"saml.authnstatement":"true","saml.server.signature":"true","saml.assertion.signature":"true","saml.client.signature":"false","saml_name_id_format":"persistent","saml.signature.algorithm":"RSA_SHA256","saml_idp_initiated_sso_url_name":"aws","saml_assertion_consumer_url_post":ACS,"saml_assertion_consumer_url_redirect":ACS}},t=tk)
          cid=g("/admin/realms/"+REALM+"/clients?clientId="+urllib.parse.quote(SAML,safe=''),tk)[0]["id"]
          for sc in g("/admin/realms/"+REALM+"/clients/"+cid+"/default-client-scopes",tk):
              if sc["name"]=="role_list":req("DELETE","/admin/realms/"+REALM+"/clients/"+cid+"/default-client-scopes/"+sc["id"],t=tk)
          for m in [{"name":"Session Role","protocol":"saml","protocolMapper":"saml-user-attribute-mapper","config":{"user.attribute":"awsRole","attribute.name":A+"/Role","attribute.nameformat":"Basic"}},{"name":"Session Duration","protocol":"saml","protocolMapper":"saml-hardcode-attribute-mapper","config":{"attribute.name":A+"/SessionDuration","attribute.nameformat":"Basic","attribute.value":"28800"}},{"name":"Session Name","protocol":"saml","protocolMapper":"saml-user-property-mapper","config":{"user.attribute":"email","attribute.name":A+"/RoleSessionName","attribute.nameformat":"Basic"}},{"name":"PrincipalTag Email","protocol":"saml","protocolMapper":"saml-user-property-mapper","config":{"user.attribute":"email","attribute.name":A+"/PrincipalTag:Email","attribute.nameformat":"Basic"}}]:
              req("POST","/admin/realms/"+REALM+"/clients/"+cid+"/protocol-mappers/models",m,t=tk)
          req("POST","/admin/realms/"+REALM+"/clients",{"clientId":OIDC,"protocol":"openid-connect","enabled":True,"publicClient":True,"standardFlowEnabled":True,"redirectUris":["http://localhost:18080","http://localhost:18080/*","http://127.0.0.1:18080/*"],"webOrigins":["+"],"attributes":{"pkce.code.challenge.method":"S256"}},t=tk)
          oid=g("/admin/realms/"+REALM+"/clients?clientId="+OIDC,tk)[0]["id"]
          oa=[x["id"] for x in g("/admin/realms/"+REALM+"/client-scopes",tk) if x["name"]=="offline_access"][0]
          req("DELETE","/admin/realms/"+REALM+"/clients/"+oid+"/optional-client-scopes/"+oa,t=tk)
          req("PUT","/admin/realms/"+REALM+"/clients/"+oid+"/default-client-scopes/"+oa,t=tk)
          print("keycloak configured")
          PYEOF
          # wait until local Keycloak is up, then configure via localhost
          for i in $(seq 1 120); do curl -sf http://localhost:5000/realms/master >/dev/null 2>&1 && break || sleep 5; done
          python3 /opt/kc-setup.py http://localhost:5000 '${KeycloakAdminPassword}' || true

  # ---------- Lambda: fetch Keycloak SAML metadata ----------
  MetaFetcherRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - { Effect: Allow, Principal: { Service: lambda.amazonaws.com }, Action: sts:AssumeRole }
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  MetaFetcherFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 900
      Role: !GetAtt MetaFetcherRole.Arn
      Code:
        ZipFile: |
          import json,urllib.request,time
          def send(e,status,data):
              b=json.dumps({"Status":status,"PhysicalResourceId":"kc-meta","StackId":e["StackId"],"RequestId":e["RequestId"],"LogicalResourceId":e["LogicalResourceId"],"Data":data}).encode()
              urllib.request.urlopen(urllib.request.Request(e["ResponseURL"],data=b,method="PUT",headers={"content-type":""}))
          def handler(e,c):
              try:
                  if e["RequestType"]=="Delete":return send(e,"SUCCESS",{})
                  url=e["ResourceProperties"]["DescriptorUrl"];meta=None
                  for _ in range(55):
                      try:
                          r=urllib.request.urlopen(url,timeout=10)
                          if r.status==200:meta=r.read().decode();break
                      except Exception:pass
                      time.sleep(15)
                  send(e,"SUCCESS" if meta else "FAILED",{"Metadata":meta or ""})
              except Exception as ex:
                  send(e,"FAILED",{"Reason":str(ex)})

  KeycloakMetadata:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: [HttpsListener, DnsRecord, KeycloakInstance]
    Properties:
      ServiceToken: !GetAtt MetaFetcherFn.Arn
      DescriptorUrl: !Sub https://${DomainName}/realms/quick/protocol/saml/descriptor

  # ---------- IAM: SAML provider + policies + roles ----------
  KeycloakSamlProvider:
    Type: AWS::IAM::SAMLProvider
    Properties:
      Name: !Sub "${NamePrefix}-keycloak"
      SamlMetadataDocument: !GetAtt KeycloakMetadata.Metadata

  AdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${NamePrefix}-QuickSight-Admin"
      PolicyDocument: { Version: '2012-10-17', Statement: [{ Effect: Allow, Action: 'quicksight:*', Resource: '*' }] }
  AuthorPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${NamePrefix}-QuickSight-Author"
      PolicyDocument: { Version: '2012-10-17', Statement: [{ Effect: Allow, Action: 'quicksight:CreateUser', Resource: '*' }] }
  ReaderPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${NamePrefix}-QuickSight-Reader"
      PolicyDocument: { Version: '2012-10-17', Statement: [{ Effect: Allow, Action: 'quicksight:CreateReader', Resource: '*' }] }

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-QuickSight-Admin-Role"
      ManagedPolicyArns: [!Ref AdminPolicy]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Federated: !Ref KeycloakSamlProvider }
            Action: ['sts:AssumeRoleWithSAML', 'sts:TagSession']
            Condition: { StringEquals: { 'SAML:aud': 'https://signin.aws.amazon.com/saml' } }
  AuthorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-QuickSight-Author-Role"
      ManagedPolicyArns: [!Ref AuthorPolicy]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Federated: !Ref KeycloakSamlProvider }
            Action: ['sts:AssumeRoleWithSAML', 'sts:TagSession']
            Condition: { StringEquals: { 'SAML:aud': 'https://signin.aws.amazon.com/saml' } }
  ReaderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-QuickSight-Reader-Role"
      ManagedPolicyArns: [!Ref ReaderPolicy]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Federated: !Ref KeycloakSamlProvider }
            Action: ['sts:AssumeRoleWithSAML', 'sts:TagSession']
            Condition: { StringEquals: { 'SAML:aud': 'https://signin.aws.amazon.com/saml' } }

Outputs:
  AdminConsole:
    Description: Keycloak admin console (username admin)
    Value: !Sub https://${DomainName}/admin
  OIDCIssuer:
    Description: Issuer URL for the Quick extension access
    Value: !Sub https://${DomainName}/realms/quick
  OIDCAuthorization:
    Description: Authorization Endpoint (must end with /auth)
    Value: !Sub https://${DomainName}/realms/quick/protocol/openid-connect/auth
  OIDCToken:
    Description: Token Endpoint (must end with /token)
    Value: !Sub https://${DomainName}/realms/quick/protocol/openid-connect/token
  OIDCJWKS:
    Description: JWKS URI (must end with /certs)
    Value: !Sub https://${DomainName}/realms/quick/protocol/openid-connect/certs
  OIDCClientId:
    Value: amazon-quick-desktop
  SamlProviderArn:
    Description: awsRole value = matching RoleArn + "," + this ProviderArn
    Value: !Ref KeycloakSamlProvider
  AdminRoleArn:
    Value: !GetAtt AdminRole.Arn
  AuthorRoleArn:
    Value: !GetAtt AuthorRole.Arn
  ReaderRoleArn:
    Value: !GetAtt ReaderRole.Arn
  AdminAwsRole:
    Description: Paste this as the user's awsRole attribute (Admin)
    Value: !Sub "${AdminRole.Arn},${KeycloakSamlProvider}"
  AuthorAwsRole:
    Description: Paste this as the user's awsRole attribute (Author)
    Value: !Sub "${AuthorRole.Arn},${KeycloakSamlProvider}"
  ReaderAwsRole:
    Description: Paste this as the user's awsRole attribute (Reader)
    Value: !Sub "${ReaderRole.Arn},${KeycloakSamlProvider}"
